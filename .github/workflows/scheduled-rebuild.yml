name: Bi-monthly security rebuild

on:
  push:
    branches:
      - main
  schedule:
    # 1st and 15th of every month at midnight UTC
    - cron: '0 0 1,15 * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild and push (no cache — picks up base image patches)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/dcronin05/cpp-playground:latest
            ghcr.io/dcronin05/cpp-playground:build-${{ github.run_id }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/dcronin05/cpp-playground
            rebuild.reason=scheduled-security-rebuild
